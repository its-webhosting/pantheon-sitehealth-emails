[Check.pantheon]
# Generic Pantheon site-health checks: frozen site, uninitialized live environment on
# a paid plan, unapplied upstream updates, PHP end-of-life.  Enabled by default; set
# to false to disable all four.
enabled = true


[Check.wordpress]
enabled = true          # PAPC, native-PHP-sessions, OCP-config, favicon checks


[Check.drupal]
enabled = true          # PAPC-module, Drupal-7-EOL/tag1_d7es, multisite-probe checks


[Database]
# currently supported database types: sqlite, mysql

type = "sqlite"
name = "database.db"

#type = "mysql"
#host = "db-server.example.com"
#port = 3306
#user = "admin"
#password = "s3cr3t-p@sSW0rd!!"
#name = "sitehealth"


[Cloudflare]
enabled = false
# Credentials come entirely from the settings below (no direct-environment fallback).  Use either
# an API token (preferred, uncomment api_token) or the email + Global API Key pair.  Each value can
# be a literal or an <{...}> substitution (see the top of this file).  The credentials need
# DNS:Read.  When enabled, the tool fetches the set of Cloudflare-proxied FQDNs (fqdns.json)
# directly from the Cloudflare API and auto-refreshes it (see docs/cloudflare-fqdns.md); the two
# --*-cloudflare-fqdns flags control that refresh.
email   = "<{secret env CLOUDFLARE_EMAIL}"
api_key = "<{secret env CLOUDFLARE_API_KEY}"
# api_token = "<{secret env CLOUDFLARE_API_TOKEN}"   # preferred when uncommented; overrides email/api_key


[Cloudflare.cachecheck]
# Per-site Cloudflare cache-configuration checks (see docs/cloudflare-cachecheck.md).
# Opt-in: requires [Cloudflare].enabled AND enabled = true here.  When enabled, account_id
# and list_name are REQUIRED (fatal if missing): before any site checks run, the program
# verifies its own external IP address (both IPv4 and IPv6, when available) appears in the
# named Cloudflare list (IPs/CIDRs) in that account, so cache results are not skewed by
# challenges applied to outside networks.  The credentials additionally need the
# "Account Filter Lists: Read" scope for that account.  NOTE: the list must contain ranges
# for EVERY IP family this host can egress on, or every report run exits fatally
# (--allow-any-source-ip skips the egress test).  All values here must resolve in the first
# substitution pass (same rule as the Cloudflare credentials above).
enabled = false
#account_id = "b6a4063d6fa89fba31cf8bf99540d7e5"   # the Cloudflare account holding the list
#list_name  = "um_networks"                        # list of allow-listed IPs/CIDRs
# Sent on every request made to sites so owners can identify this tool in their logs:
#user_agent = "pantheon-sitehealth-emails (Linux; UMich WWS 0.1) webmaster@umich.edu"
# Per-request timeout, seconds:
#timeout = 5
# The "Understanding your Cloudflare cache report" page linked from notices:
#report_doc_url = "https://documentation.its.umich.edu/cloudflare-cache-report"


[AWS]
enabled = false
# Values to use if the environment variables AWS_PROFILE or
# AWS_DEFAULT_REGION are not set.
profile = "webhosting"
default_region = "us-east-1"


[Email]
# Identity of the report emails.  All keys are optional; if omitted, the University of
# Michigan defaults are used (the tool's original hardcoded values), so existing U-M runs
# are unaffected.  Set these for a non-U-M deployment.
# from        = "Example Web Team <webteam@example.edu>"      # the From: header
# reply_to    = "webteam@example.edu"                          # the Reply-to: header
# msgid_domain = "reports.example.edu"                         # domain for inline-image Content-IDs
# Sent only with --for-real:
# bcc         = "ops@example.edu"                              # the Bcc: header
# Dry-run addressing (without --for-real, all mail goes to the logged-in user):
# dry_run_to             = "ops@example.edu"                   # extra dry-run recipient
# dry_run_username_domain = "example.edu"                      # {smtp-username}@<this> is added to To:

[SMTP]
# Outgoing mail server.  When enabled, the tool sends the generated reports (to the dry-run test
# addresses unless --for-real is given); when disabled it only writes the .eml files.
enabled  = false
host     = "smtp.mail.umich.edu"
port     = 465
username = "<{env USER}"                    # override at runtime with --smtp-username
password = "<{secret env SMTP_PASSWORD}"    # required when enabled

[News]
# News items can go in this section here and/or in *.toml files in the directory below.
