
# ---------------------------------------------------------------------------------------------
# Value substitutions
#
# Any string value below may pull its value from an external source with a "<{ ... }>" marker:
#
#   <{env NAME}                 -> the value of environment variable NAME (error if unset)
#   <{secret env NAME}          -> same as above (the "secret" prefix is an accepted alias)
#   <{env NAME default}         -> NAME if set, else the literal "default" (quote for spaces)
#   <{secret aws SECRET KEY}    -> a key from an AWS Secrets Manager secret (needs [AWS] enabled)
#
# A referenced environment variable that is not set aborts the run with an error naming the
# setting and the variable -- unless a default was supplied.  A variable that is set but empty
# yields "" (set is not the same as unset).
#
# Disabled sections: if a section has `enabled = false`, only `enabled` is kept and all other
# settings in that section are dropped before substitution -- so turning a feature off never
# requires that feature's secrets/environment variables to exist.
# ---------------------------------------------------------------------------------------------

