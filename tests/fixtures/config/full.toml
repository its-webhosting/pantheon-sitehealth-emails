# Self-contained test config with the optional plugins ENABLED, for exercising
# plugin/check self-registration (an import-time side effect gated by these flags).
# Tests that load this config mock the plugins' external calls (Cloudflare SDK, boto3,
# the UMich portal DB) — it is NOT used for a full live run in the smoke set.
#
# Inherits the same [Pantheon]/[Database]/[News] shape as minimal.toml.

[Pantheon]
org_id = "23c7208e-5f2a-4388-9fc4-5c3a038ef8b9"
overage_block_size = 10000
overage_block_cost = 40.00

[Pantheon.plan_info."Basic"]
upgrade_at    = 155000
upgrade_to    = "Performance Large"
downgrade_to  = "-"
traffic_limit = 35000
cost          = 500.00

[Pantheon.plan_info."Performance Small"]
upgrade_at    = 65000
upgrade_to    = "Performance Medium"
downgrade_to  = "-"
traffic_limit = 35000
cost          = 1925.00

[Pantheon.plan_sku_to_name]
plan-free-preferred-monthly-1            = "Sandbox"
plan-basic_small-contract-annual-1       = "Basic"
plan-performance_small-contract-annual-1 = "Performance Small"

[Database]
type = "sqlite"
name = "test.db"

[Cloudflare]
enabled = true
member_email = "user@example.com"
member_api_key = "xxxxxxxx"

[AWS]
enabled = true
profile = "webhosting"
default_region = "us-east-1"

[UMich]
enabled = true

[News]
folder = "./news"
